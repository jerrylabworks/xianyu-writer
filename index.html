<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>闲鱼文案生成器</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🐟 闲鱼文案生成器</h1>
      <p class="subtitle">3秒生成爆款标题+正文+标签</p>
    </header>

    <div class="form-section">
      <div class="form-group">
        <label>商品名称 <span class="required">*</span></label>
        <input type="text" id="productName" placeholder="例如：希捷 2TB 移动硬盘">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>商品类别</label>
          <select id="category">
            <option value="digital">数码电子</option>
            <option value="book">图书教材</option>
            <option value="clothing">服装鞋包</option>
            <option value="beauty">美妆护肤</option>
            <option value="home">家居日用</option>
            <option value="other">其他</option>
          </select>
        </div>
        <div class="form-group">
          <label>新旧程度</label>
          <select id="condition">
            <option value="new">全新未拆封</option>
            <option value="like_new">几乎全新</option>
            <option value="good">轻微使用痕迹</option>
            <option value="fair">明显使用痕迹</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>原价（元）</label>
          <input type="number" id="originalPrice" placeholder="例如：99">
        </div>
        <div class="form-group">
          <label>售价（元）</label>
          <input type="number" id="sellPrice" placeholder="例如：58">
        </div>
      </div>

      <div class="form-group">
        <label>补充描述 <span class="hint">（配件、功能亮点等）</span></label>
        <textarea id="details" rows="3" placeholder="例如：USB 3.0接口，读写速度快；原装数据线齐全..."></textarea>
      </div>

      <div class="form-group">
        <label>📸 商品照片 <span class="hint">（选填，本地上传仅预览）</span></label>
        <div class="upload-area" id="uploadArea">
          <input type="file" id="productImages" multiple accept="image/*" style="display:none">
          <div class="upload-placeholder" id="uploadPlaceholder">
            <span class="upload-icon">📷</span>
            <span class="upload-text">点击上传商品照片</span>
            <span class="upload-sub">建议拍摄：正面、侧面、细节、配件</span>
          </div>
          <div class="image-preview-grid" id="imagePreviewGrid"></div>
        </div>
        <div class="image-count" id="imageCount" style="display:none">已选 0 张</div>
      </div>
    </div>

    <button id="previewBtn" class="btn-secondary">
      👁️ 预览效果
    </button>

    <div class="preview-modal" id="previewModal" style="display:none;">
      <div class="preview-overlay" id="previewOverlay"></div>
      <div class="preview-card">
        <div class="preview-header">
          <h3>闲鱼发布预览</h3>
          <button class="preview-close" id="previewClose">✕</button>
        </div>
        <div class="preview-body">
          <div class="preview-images" id="previewImages"></div>
          <div class="preview-price-row">
            <span class="preview-price" id="previewPrice">¥--</span>
            <span class="preview-original" id="previewOriginal"></span>
          </div>
          <h4 class="preview-title" id="previewTitle">商品标题</h4>
          <div class="preview-tags" id="previewTags"></div>
          <div class="preview-desc" id="previewDesc">点击"生成文案"后这里会显示完整描述...</div>
          <div class="preview-user">
            <span class="preview-avatar">👤</span>
            <span>个人闲置 · 信用极好</span>
          </div>
        </div>
        <div class="preview-footer">
          <button class="btn-copy" id="btnBackToEdit">← 返回修改</button>
          <button class="btn-primary" id="btnGenerateFromPreview">✨ 确认生成文案</button>
        </div>
      </div>
    </div>

    <button id="generateBtn" class="btn-primary">
      ✨ 生成文案
    </button>

    <div class="result-section" id="resultSection" style="display:none;">
      <div class="result-tabs">
        <button class="tab-btn active" data-tab="title">标题</button>
        <button class="tab-btn" data-tab="body">正文</button>
        <button class="tab-btn" data-tab="tags">标签</button>
      </div>

      <div class="tab-content active" id="tab-title">
        <textarea id="resultTitle" readonly></textarea>
        <button class="btn-copy" data-target="resultTitle">📋 复制标题</button>
      </div>

      <div class="tab-content" id="tab-body">
        <textarea id="resultBody" readonly rows="8"></textarea>
        <button class="btn-copy" data-target="resultBody">📋 复制正文</button>
      </div>

      <div class="tab-content" id="tab-tags">
        <div class="tags-display" id="resultTags"></div>
        <button class="btn-copy" data-target="resultTags">📋 复制标签</button>
      </div>
    </div>

    <div class="tips" id="tipsSection" style="display:none;">
      <h3>💡 发布小贴士</h3>
      <ul>
        <li>标题前20字最关键，把核心卖点放前面</li>
        <li>9张图能放满就放满，主图要干净</li>
        <li>包邮比不包邮曝光量高30%</li>
        <li>晚上8-10点发布，流量高峰</li>
      </ul>
    </div>

    <footer>
      <p>Made with ❤️ by AI · 仅供个人使用</p>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
